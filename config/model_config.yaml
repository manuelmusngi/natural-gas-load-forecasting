lstm_enhanced:
  input_length: 48
  forecast_horizon: 24
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  bidirectional: false
  use_layer_norm: true
  use_residual: true
  feature_selection:
    method: "mutual_information"  # or "shap", "none"
    top_k: 30

hybrid_transformer_reslstm:
  input_length: 72
  forecast_horizon: 24
  d_model: 128
  nhead: 4
  num_encoder_layers: 2
  dim_feedforward: 256
  dropout: 0.1
  reslstm_hidden_size: 128
  reslstm_num_layers: 2
  vmd:
    num_modes: 5
    alpha: 2000
    tau: 0
    DC: 0
    init: 1
    tol: 1e-6

baselines:
  arima:
    order: [2, 1, 2]
    seasonal_order: [1, 0, 1, 24]
  lightgbm:
    num_leaves: 31
    learning_rate: 0.05
    n_estimators: 500
